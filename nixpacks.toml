[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install && npm run build"
]

[start]
cmd = "envsubst '$MYSQLDATABASE $MYSQLUSER $MYSQLPASSWORD' < .env.example > .env && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
